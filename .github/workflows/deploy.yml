name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.223.42.82
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~ && rm -rf uybot uybot.zip
            curl -L https://github.com/Bakhodir-Khushbokov/uybot/archive/refs/heads/main.zip -o uybot.zip
            unzip uybot.zip
            mv uybot-main uybot
            systemctl restart uybot
